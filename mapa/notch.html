<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Planner iOS</title>
    <style>
        /* --- BASE & TYPOGRAPHY (iOS Style) --- */
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759; /* Verde estilo Apple */
            --ios-bg: #F2F2F7;
            --ios-card-bg: #ffffff;
            --ios-separator: rgba(60, 60, 67, 0.29); /* Cor das linhas finas */
            /* Usamos a cor original verde como tema principal, mas ajustada */
            --theme-color: #34C759; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            /* Fonte nativa da Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--ios-bg); /* Fundo cinza claro padrão iOS */
            -webkit-user-select: none;
            user-select: none;
            color: #000;
        }

        /* --- CABEÇALHO (Glassmorphism & Safe Area) --- */
        #header-fixo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            /* Altura ajustada para incluir a safe area */
            height: calc(44px + env(safe-area-inset-top));
            padding-top: env(safe-area-inset-top);
            /* Efeito de vidro fosco nativo */
            background: rgba(249, 249, 249, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            /* Borda fina inferior estilo iOS */
            border-bottom: 0.5px solid var(--ios-separator);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #header-fixo b {
            font-size: 17px; /* Tamanho padrão de título iOS */
            font-weight: 600;
            color: #000;
            width: auto;
            display: block;
            text-align: center;
            padding-left: 0;
            pointer-events: none;
        }

        /* --- LAYOUT PRINCIPAL --- */
        #w {
            display: none;
            /* Margem superior para compensar o cabeçalho translúcido */
            margin-top: calc(44px + env(safe-area-inset-top) + 20px);
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); /* Espaço para o botão fixo */
        }
        .map-outer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px; /* Margem lateral padrão iOS */
        }
        .info-passageiro {
            width: 100%;
            max-width: 343px; /* Largura típica de card iOS em telas pequenas */
            margin-bottom: 15px;
            text-align: left;
            color: #000;
            pointer-events: none;
            padding-left: 4px;
        }
        #p1-label { font-size: 13px; color: #8e8e93; font-weight: 400; display: block; text-transform: uppercase; margin-bottom: 4px;}
        #p1-nome { font-size: 22px; font-weight: 700; line-height: 1.2; color: #000;}

        /* Card do Mapa (Estilo "Inset Grouped" do iOS) */
        .bc {
            transform: scale(0.9); /* Leve ajuste de escala */
            transform-origin: top center;
            padding: 24px;
            border: none; /* Removemos a borda grossa cinza */
            border-radius: 14px; /* Cantos arredondados padrão iOS */
            width: fit-content;
            position: relative;
            background: var(--ios-card-bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); /* Sombra muito suave */
        }

        /* --- GRID & ASSENTOS --- */
        .g { display: grid; grid-template-columns: repeat(5, 54px); gap: 14px 10px; justify-content: center; }
        .s, .e {
            width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; /* Cantos um pouco mais suaves */
            position: relative;
            font-size: 18px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .s:active:not(.mine):not(.white) { transform: scale(0.95); opacity: 0.8; } /* Efeito de toque iOS */
        .s { background: var(--theme-color); border: none; color: #fff; font-weight: 600; cursor: pointer; }
        .s.selected { background: #f1c40f; /* Mantido amarelo para destaque, pode mudar */ }
        .s.mine, .s.lt { background: #aeaeb2; color: #fff; cursor: default; pointer-events: none; }
        .s.white { background: #fff!important; border: 2px solid #d1d1d6!important; color: transparent!important; pointer-events: none; }
        .s::after {
            content: ""; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 32px; height: 14px; border-radius: 8px; background: #fff;
            border: 2px solid #d1d1d6; /* Fronteira mais sutil */
        }
        .e { background: 0 0; pointer-events: none; }

        /* --- BOTÕES E BARRA LATERAL --- */
        #btn {
            width: calc(100% - 32px); /* Largura total menos margem */
            max-width: 343px;
            height: 50px;
            background: var(--theme-color);
            color: #fff;
            border: none;
            font-size: 17px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            position: fixed; /* Fixo na parte inferior */
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 900;
            transition: opacity 0.2s;
        }
        #btn:active { opacity: 0.7; }
        #btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #cbx {
            position: absolute; top: 20px; left: 100%; width: 40px; height: auto; padding: 10px 0;
            background: var(--theme-color); color: #fff; font-weight: 700;
            display: flex; align-items: center; justify-content: center; pointer-events: none;
            border-radius: 0 10px 10px 0; margin-left: -2px;
        }
        #ctx { transform: rotate(-90deg); font-size: 16px; white-space: nowrap; }

        /* --- BARRA DE PROGRESSO --- */
        #pbc { position: fixed; bottom: 0; width: 100%; height: 4px; background: #0001; z-index: 1001; pointer-events: none; 
            /* A barra de progresso fica acima da safe area */
            padding-bottom: env(safe-area-inset-bottom); background-clip: content-box;
        }
        #pb { width: 0; height: 100%; background: var(--theme-color); transition: width .1s ease-out; }

        @media(min-width: 800px) {
            /* Ajustes para telas maiores (iPad) */
            #header-fixo { justify-content: center; }
            #header-fixo b { width: auto; padding-left: 0; }
            #w { margin-top: calc(60px + env(safe-area-inset-top)); }
            .info-passageiro { position: relative; left: auto; top: auto; width: 100%; max-width: 400px; margin: 0 0 20px 0; text-align: center;}
            #p1-nome { font-size: 28px; }
            .bc { margin: 0 auto; transform: scale(1); }
             #btn { position: absolute; bottom: -70px; width: 100%; max-width: none; left: 0; transform: none; }
        }

        /* --- CUSTOM IOS ALERT CSS (Essencial) --- */
        #ios-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4); z-index: 9999;
            align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
            opacity: 0; transition: opacity 0.2s ease-in-out;
        }
        #ios-overlay.show { display: flex; opacity: 1; }
        
        #ios-alert {
            width: 270px;
            background-color: rgba(249, 249, 249, 0.85); /* Vidro fosco */
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 14px;
            text-align: center;
            overflow: hidden;
            transform: scale(1.1); opacity: 0; transition: all 0.2s ease-in-out;
        }
        #ios-overlay.show #ios-alert { transform: scale(1); opacity: 1; }

        .ios-alert-content { padding: 20px 16px 20px 16px; }
        .ios-alert-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: #000; }
        .ios-alert-msg { font-size: 13px; color: #000; line-height: 1.4; }
        
        .ios-alert-buttons { display: flex; flex-direction: row; border-top: 0.5px solid var(--ios-separator); }
        .ios-alert-buttons.vertical { flex-direction: column; }
        .ios-btn {
            flex: 1; padding: 12px 0; font-size: 17px; color: var(--ios-blue); background: transparent;
            border: none; cursor: pointer; font-weight: 400; position: relative;
        }
        .ios-btn:active { background-color: rgba(0,0,0,0.05); }
        .ios-btn.bold { font-weight: 600; }
        .ios-btn.destructive { color: #ff3b30; }
        
        /* Hairline separator entre botões horizontais */
        .ios-alert-buttons:not(.vertical) .ios-btn:not(:last-child)::after {
            content: ''; position: absolute; right: 0; top: 0; height: 100%; width: 0.5px; background-color: var(--ios-separator);
        }
        /* Hairline separator entre botões verticais */
        .ios-alert-buttons.vertical .ios-btn:not(:last-child) { border-bottom: 0.5px solid var(--ios-separator); }

    </style>
</head>
<body>
    <div id="header-fixo"><b>Planner</b></div>
    
    <div id="w">
        <div class="map-outer">
            <div class="info-passageiro">
                <span id="p1-label">Passageiro</span>
                <div id="p1-nome"></div>
            </div>
            <div class="bc">
                <div id="cbx"><div id="ctx"></div></div>
                <button id="btn">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div id="pbc"><div id="pb"></div></div>

    <div id="ios-overlay">
        <div id="ios-alert">
            <div class="ios-alert-content">
                <div class="ios-alert-title" id="ios-title">Aviso</div>
                <div class="ios-alert-msg" id="ios-msg"></div>
            </div>
            <div class="ios-alert-buttons" id="ios-btns">
                </div>
        </div>
    </div>

            }};
