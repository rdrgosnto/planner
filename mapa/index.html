<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Planner - Mapa</title>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:Arial,sans-serif;margin:0;display:flex;flex-direction:column;min-height:100vh;background:#fff;-webkit-user-select:none;user-select:none}
        #h{position:fixed;top:0;width:100%;height:54px;background:#fff;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center}
        #h b{font-size:28px;color:#38BA54;width:248px}#w{display:none;margin-top:70px;flex-direction:column;align-items:center}.map-outer{display:flex;flex-direction:column;align-items:center}
        .info-p{width:248px;margin-bottom:10px;color:#38BA54}#p1-n{font-size:20px;font-weight:700;line-height:1.2}.bc{transform:scale(.8);transform-origin:top center;padding:20px;border:3px solid #38BA54;border-radius:16px;position:relative;background:#fff}
        .g{display:grid;grid-template-columns:repeat(5,54px);gap:14px 10px;justify-content:center}.s,.e{width:54px;height:54px;display:flex;align-items:center;justify-content:center;border-radius:12px;position:relative}
        .s{background:#38BA54;border:3px solid #38BA54;color:#fff;font-weight:700;cursor:pointer}.s.selected,.s.mine,.s.lt{background:#123B1A;border-color:#123B1A}.s.mine,.s.lt{pointer-events:none}
        .s.white{background:#fff!important;border:3px solid #38BA54!important;color:transparent!important;pointer-events:none}.s::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:32px;height:14px;border-radius:8px;background:#fff;border:3px solid #38BA54}
        .e{pointer-events:none}#btn{width:112px;height:54px;background:#38BA54;color:#fff;border:none;font-size:16px;font-weight:700;border-radius:12px;cursor:pointer;position:absolute;bottom:-64px;right:20px}
        #btn:disabled{opacity:.6;cursor:not-allowed}#cbx{position:absolute;top:60px;left:100%;width:40px;height:122px;background:#38BA54;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center}
        #ctx{transform:rotate(-90deg);font-size:18px;white-space:nowrap}#pbc{position:fixed;bottom:0;width:100%;height:8px;background:#0001}#pb{width:0;height:100%;background:#38BA54;transition:width .1s}
        @media(min-width:800px){#h{justify-content:flex-start}#h b{padding-left:40px}#w{margin-top:94px;position:relative}.info-p{position:absolute;left:40px;top:0;width:auto}#p1-n{font-size:24px}.bc{margin:0 auto}}
    </style>
</head>
<body>
    <div id="h"><b>Planner</b></div>
    <div id="w">
        <div class="map-outer">
            <div class="info-p"><span>Passageiro 1</span><div id="p1-n"></div></div>
            <div class="bc"><div id="cbx"><div id="ctx"></div></div><button id="btn">CONFIRMAR</button></div>
        </div>
    </div>
    <div id="pbc"><div id="pb"></div></div>
<script>
const q=s=>document.querySelector(s),nm=c=>c?c.toString().replace(/\D/g,"").padStart(11,"0"):"",
gf=(o,n)=>{if(!o)return"";let k=Object.keys(o).find(key=>key.toLowerCase()===n.toLowerCase());return k?o[k].toString().trim():""},
fn=s=>{if(!s)return"Passageiro";let p=s.toLowerCase().split(' ').map(w=>['da','das','de','do','dos','e'].includes(w)?w:w[0].toUpperCase()+w.slice(1));return(window.innerWidth<800&&p.length>2)?p[0]+" "+p[p.length-1]:p.join(' ')};

const B="https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/",
E="/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=",
U={G:B+"239ef024d32946f99a66585bed86d236"+E+"ItjHZInk4ZgqUycsWShgWkI1PEphNs_bQhmpReiFwuA",P:B+"478aac5453024f5cb3d3b26495d9b7e0"+E+"H6EQYc3xSSZazBjzf0vB_9u5QtwLNj_hnuoBM9CWgz0",S:B+"1d167b2351e14940acb006f964b87cef"+E+"V8asrBbmlcMNS9h0ubUJ8Sd8wT02Knni3VOhhU0IjFg"},
cmap={AAL:"0046",ALI:"0046",QUI:"0046",UEE:"0046"};

let sel=null,bl=[],us=[],cpf=null,cur="",lock=!1,an;

const bar=t=>{let b=q("#pb");clearInterval(an);let w=parseInt(b.style.width)||0;an=setInterval(()=>{w>=t?clearInterval(an):(w++,b.style.width=w+"%")},5)};

const rd=l=>{
    q(".g")?.remove();const g=document.createElement("div");g.className="g";
    l?.forEach(r=>r.forEach(v=>{
        const e=document.createElement("div");e.className=v===null?"e":"s";
        if(v!==null){
            const id=v.toString().padStart(2,"0");if(v!=="white"){e.textContent=id;e.dataset.s=id}
            if(us.includes(id))e.classList.add("mine");else if(bl.includes(id)||v==="white")e.classList.add("white");else e.onclick=()=>sl(e);
        }g.appendChild(e)
    }));q(".bc").appendChild(g)
};

const sl=e=>{if(lock||e.classList.contains("white")||e.classList.contains("mine"))return;if(sel)sel.classList.remove("selected");sel=(sel===e)?null:e;sel?.classList.add("selected")};

const ld=async()=>{
    const sC=sessionStorage.getItem("cpf");if(!sC)return location.href="../index.html";
    cpf=nm(sC);bar(30);
    try{
        let d,pre=sessionStorage.getItem("preData");
        if(pre){d=JSON.parse(pre);sessionStorage.removeItem("preData");bar(70)}
        else{const r=await fetch(U.G,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cpf})});d=await r.json();bar(70)}
        
        const a=(d.codigo||[]).find(x=>nm(x.CPF2)===cpf);if(!a)throw "CPF não encontrado";
        q("#p1-n").textContent=fn(gf(a,"NOME"));
        cur=gf(a,"CODIGO").toUpperCase()||"UEE";q("#ctx").textContent=cur;

        const l=d.poltronas||[];
        const rows=l.filter(x=>gf(x,"CURSO").toUpperCase()===cur);
        bl=[...new Set(rows.map(x=>gf(x,"ID").padStart(2,"0")).filter(b=>b!=="00"))];
        us=rows.filter(x=>nm(x.CPF2)===cpf).map(x=>gf(x,"ID").padStart(2,"0"));

        const ly=cmap[cur]||"0046";
        const cfg=await fetch(`../configs/${ly}.json`).then(r=>r.json()).catch(async()=>await fetch(`configs/${ly}.json`).then(r=>r.json()));
        rd(cfg.layout);bar(100);setTimeout(()=>{q("#pbc").remove();q("#w").style.display="flex"},400);
    }catch(e){alert("Erro: "+e)}
};

q("#btn").onclick=async()=>{
    if(lock||!sel)return !sel&&alert("Selecione uma poltrona");
    const old=us[0]||null;if(!confirm(old?"Trocar poltrona?":"Confirmar poltrona?"))return;
    lock=!0;q("#btn").disabled=!0;const n=sel.dataset.s;
    try{
        const p=old?{cpf,curso:cur,current:old,select:n}:{poltrona:n,CURSO:cur,cpf},
        r=await fetch(old?U.S:U.P,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
        if(r.ok){alert("Sucesso!");location.reload()}else alert("Poltrona ocupada");
    }catch(e){alert("Erro ao salvar")}finally{lock=!1;q("#btn").disabled=!1}
};
ld();
</script>
</body>
</html>
