<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Planner</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:Arial,sans-serif;margin:0;display:flex;flex-direction:column;min-height:100vh;background:#fff;-webkit-user-select:none;user-select:none}
  
  /* HEADER */
  #header-fixo{position:fixed;top:0;left:0;width:100%;height:54px;background:#fff;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center}
  /* TEXTO: Cor alterada para #77A632 */
  #header-fixo b{font-size:28px;color:#77A632;width:248px;display:block;text-align:left;padding-left:0;pointer-events:none}
  
  #w{display:none;margin-top:70px;width:100%;flex-direction:column;align-items:center}
  .map-outer{width:100%;display:flex;flex-direction:column;align-items:center}
  
  /* INFO PASSAGEIRO: Cor alterada para #77A632 */
  .info-passageiro{width:248px;margin-bottom:10px;text-align:left;color:#77A632;pointer-events:none}
  #p1-label{font-size:16px;font-weight:700;display:block}
  #p1-nome{font-size:20px;font-weight:bold;line-height:1.2}
  
  /* CONTAINER DAS POLTRONAS: Borda alterada para #77A632 */
  .bc{transform:scale(.8);transform-origin:top center;padding:20px;border:3px solid #77A632;border-radius:16px;width:fit-content;position:relative;background:#fff}
  
  .g{display:grid;grid-template-columns:repeat(5,54px);gap:14px 10px;justify-content:center}
  .s,.e{width:54px;height:54px;display:flex;align-items:center;justify-content:center;border-radius:12px;position:relative}
  
  /* POLTRONA LIVRE: Fundo e Borda alterados para #77A632 */
  .s{background:#77A632;border:3px solid #77A632;color:#fff;font-weight:700;cursor:pointer}
  
  /* SELECIONADA TEMPORARIAMENTE: Cor alterada para #A7F272 */
  .s.selected{background:#A7F272;border-color:#A7F272}
  
  /* MINHA POLTRONA (DEFINITIVA): Cor alterada para #A7F272 */
  .s.mine,.s.lt{background:#A7F272;border-color:#A7F272;cursor:default;pointer-events:none}
  
  /* POLTRONA BRANCA (OCUPADA): Borda alterada para #77A632 */
  .s.white{background:#fff!important;border:3px solid #77A632!important;color:transparent!important;pointer-events:none}
  
  /* TRAVESSEIRO: Borda alterada para #77A632 */
  .s::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:32px;height:14px;border-radius:8px;background:#fff;border:3px solid #77A632}
  
  .e{background:0 0;pointer-events:none}
  
  /* BOTÃO: Fundo alterado para #77A632 */
  #btn{width:112px;height:54px;background:#77A632;color:#fff;border:none;font-size:16px;font-weight:700;border-radius:12px;cursor:pointer;position:absolute;bottom:-64px;right:20px}
  #btn:disabled{opacity:.6;cursor:not-allowed}
  
  /* CAIXA DA TURMA (LATERAL): Fundo alterado para #77A632 */
  #cbx{position:absolute;top:60px;left:100%;width:40px;height:122px;background:#77A632;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none}
  #ctx{transform:rotate(-90deg);font-size:18px;white-space:nowrap}
  
  /* PROGRESS BAR */
  #pbc{position:fixed;bottom:0;width:100%;height:8px;background:#0001;z-index:1001;pointer-events:none}
  /* BARRA DE PROGRESSO: Cor alterada para #77A632 */
  #pb{width:0;height:100%;background:#77A632;transition:width .1s}
  
  @media(min-width:800px){
    #header-fixo{justify-content:flex-start}
    #header-fixo b{width:100%;padding-left:40px}
    #w{margin-top:94px;position:relative}
    .info-passageiro{position:absolute;left:40px;top:0;width:auto;margin:0;z-index:10}
    #p1-nome{font-size:24px}
    .bc{margin:0 auto}
  }
</style>
</head>
<body>

      <div id="p1-nome"></div>
    </div>
    <div class="bc">
      <div id="cbx"><div id="ctx"></div></div>
      <button id="btn">CONFIRMAR</button>
    </div>
  </div>
</div>
<div id="pbc"><div id="pb"></div></div>
