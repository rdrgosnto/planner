<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Planner</title>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:Arial,sans-serif;margin:0;display:flex;flex-direction:column;min-height:100vh;background:#fff;-webkit-user-select:none;user-select:none}
        
        /* HEADER: Fixado em 29px de padding-left */
        #header-fixo{position:fixed;top:0;left:0;width:100%;height:54px;background:#fff;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center}
        #header-fixo b{font-size:28px;color:#4CAF50;width:310px;display:block;text-align:left;padding-left:29px;pointer-events:none}
        
        /* WRAPPER: Alinhado em 29px para bater com o Header */
        #w{display:none;margin-top:70px;width:100%;flex-direction:column;padding-left:29px}

        .info-passageiro{width:fit-content;margin:0 0 15px 0;text-align:left;color:#4CAF50;pointer-events:none}
        #p1-label{font-size:17px;font-weight:700;display:block}
        #p1-nome{font-size:24px;font-weight:bold;line-height:1.2}

        /* MAPA MOBILE: Escala a partir da ESQUERDA (left) para manter o alinhamento com o texto */
        .bc{
            transform: scale(0.75);
            transform-origin: top left; 
            padding: 20px;
            border: 3px solid #b0b0b0;
            border-radius: 16px;
            width: fit-content;
            position: relative;
            display: flex;
            justify-content: center;
            margin: 0; /* Remove o auto para nĂŁo centralizar no mobile */
        }
        
        .g{display:grid;grid-template-columns:repeat(5,54px);gap:14px 10px;justify-content:center}
        .s,.e{width:54px;height:54px;display:flex;align-items:center;justify-content:center;border-radius:12px;position:relative}
        .s{background:#4CAF50;border:3px solid #4CAF50;color:#fff;font-weight:700;cursor:pointer}
        .s.selected{background:#f1c40f;border-color:#f1c40f}
        .s.mine,.s.lt{background:#aaa;border-color:#777;cursor:default;pointer-events:none}
        .s.white{background:#fff!important;border:3px solid #8c96b2!important;color:transparent!important;pointer-events:none}
        .s::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:32px;height:14px;border-radius:8px;background:#fff;border:3px solid #8c96b2}
        .e{background:0 0;pointer-events:none}
        
        #btn{width:112px;height:54px;background:#4CAF50;color:#fff;border:none;font-size:16px;font-weight:700;border-radius:12px;cursor:pointer;position:absolute;bottom:-64px;right:20px}
        #btn:disabled{opacity:.6;cursor:not-allowed}
        #cbx{position:absolute;top:60px;left:100%;width:40px;height:122px;background:#4CAF50;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none}
        #ctx{transform:rotate(-90deg);font-size:18px;white-space:nowrap}
        
        #pbc{position:fixed;bottom:0;width:100%;height:8px;background:#0001;z-index:1001;pointer-events:none}
        #pb{width:0;height:100%;background:#4CAF50;transition:width .1s}

        /* DESKTOP */
        @media(min-width:800px){
            #header-fixo{justify-content:flex-start}
            #header-fixo b{width:100%;padding-left:40px}
            
            /* No PC, o wrapper usa 40px e centraliza o mapa */
            #w{margin-top:94px;padding-left:0;display: flex !important; flex-direction: row; justify-content: center;}
            
            .info-passageiro{position:absolute;left:40px;top:0;margin:0;width:auto;z-index:2}
            #p1-label{font-size:18px}
            #p1-nome{font-size:28px}
            
            .bc{margin:0; transform:scale(.75); transform-origin: top center;}
        }
    </style>
</head>
<body>
    <div id="header-fixo"><b>Planner</b></div>
    <div id="w">
        <div class="info-passageiro">
            <span id="p1-label">Passageiro 1</span>
            <div id="p1-nome"></div>
        </div>
        <div class="bc">
            <div id="cbx"><div id="ctx"></div></div>
            <button id="btn">CONFIRMAR</button>
        </div>
    </div>
    <div id="pbc"><div id="pb"></div></div>

    <script>
        const q=s=>document.querySelector(s),nm=c=>c?.toString().replace(/\D/g,"").padStart(11,"0")||"",
        gf=(o,...n)=>{for(let x of n){let k=Object.keys(o||{}).find(z=>z.toLowerCase()===x.toLowerCase());if(k)return o[k]}},
        
        fn=s=>{
            if(!s) return "";
            let p = s.toLowerCase().split(' ').map(w=>['da','das','de','do','dos','e'].includes(w)?w:w.charAt(0).toUpperCase()+w.slice(1));
            if(window.innerWidth < 800 && p.length > 2) return p[0] + " " + p[p.length - 1];
            return p.join(' ');
        },

        B="https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/",
        E="/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=",
        U={G:`${B}239ef024d32946f99a66585bed86d236${E}ItjHZInk4ZgqUycsWShgWkI1PEphNs_bQhmpReiFwuA`,P:`${B}478aac5453024f5cb3d3b26495d9b7e0${E}H6EQYc3xSSZazBjzf0vB_9u5QtwLNj_hnuoBM9CWgz0`,S:`${B}1d167b2351e14940acb006f964b87cef${E}V8asrBbmlcMNS9h0ubUJ8Sd8wT02Knni3VOhhU0IjFg`},
        cmap={AAL:"0046",ALI:"0046",QUI:"0046"};
        
        let sel=null,bl=[],us=[],cpf=null,cur="",lock=false;
        const an=t=>{let b=q("#pb"),w=0,i=setInterval(()=>{w>=t?clearInterval(i):(w++,b.style.width=w+"%")},10)},
        rd=l=>{const c=q(".bc"),o=q(".g");o?.remove();const g=document.createElement("div");g.className="g";l.forEach(r=>r.forEach(v=>{const e=document.createElement("div");if(v===null)e.className="e";else{e.className="s";const id=v.toString().padStart(2,"0");if(v!=="white"){e.textContent=id;e.dataset.s=id}if(us.includes(id))e.classList.add("mine");else if(bl.includes(id)||v==="white")e.classList.add("white");else e.onclick=()=>sl(e)}g.appendChild(e)}));c.appendChild(g)},
        sl=e=>{if(lock||e.classList.contains("white")||e.classList.contains("mine")||e.classList.contains("lt"))return;if(sel)sel.classList.remove("selected");sel=(sel===e)?null:e;sel?.classList.add("selected")},
        
        ld=async()=>{
            const c=sessionStorage.getItem("cpf");
            if(!c)return location.href="https://rdrgosnto.github.io/planner";
            cpf=nm(c);an(40);
            try{
                const r=await fetch(U.G,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cpf})}),d=await r.json();an(70);
                const l=d.poltronas||d.lista||[],s=d.codigo||d.cursos||[],a=s.find(x=>nm(gf(x,"CPF2","CPF"))===cpf);
                if(!a)return alert("CPF nĂŁo achado");
                q("#p1-nome").textContent=fn(gf(a,"NOME"));
                cur=gf(a,"CODIGO","Codigo").toString().trim().toUpperCase();
                q("#ctx").textContent=cur;
                const rows=l.filter(x=>gf(x,"CURSO","Curso")?.toString().trim().toUpperCase()===cur);
                bl=[...new Set(rows.map(x=>gf(x,"ID","Id")?.toString().padStart(2,"0")).filter(Boolean))];
                us=rows.filter(x=>nm(gf(x,"CPF2","CPF"))===cpf).map(x=>gf(x,"ID","Id").toString().padStart(2,"0"));
                const cfg=await fetch(`../configs/${cmap[cur]||"0046"}.json`).then(r=>r.json());
                rd(cfg.layout);
                an(100);setTimeout(()=>q("#pbc").remove(),600);
                q("#w").style.display="flex";
            }catch(e){alert("Erro")}
        },
        
        pX=async()=>{
            if(lock||!sel)return!sel&&alert("Selecione uma poltrona");
            if(!confirm("Confirma troca de poltrona?"))return;
            lock=true;q("#btn").disabled=true;
            const n=sel.dataset.s,old=us[0]||null,el=sel;
            try{
                const p=old?{cpf,curso:cur,current:old,select:n}:{poltrona:n,CURSO:cur,cpf},
                r=await fetch(old?U.S:U.P,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
                if(r.ok){
                    if(old){let oE=q(`.s[data-s="${old}"]`);if(oE){oE.classList.remove("mine");oE.onclick=()=>sl(oE)}}
                    el.classList.remove("selected");el.classList.add("mine");us=[n];
                    alert("Poltrona selecionada com sucesso!");
                    sel=null;
                }else{alert("Poltrona ocupada");el.classList.replace("selected","lt");setTimeout(()=>{el.classList.replace("lt","white")},4000);sel=null}
            }catch(e){alert("Erro")}finally{lock=false;q("#btn").disabled=false}
        };
        
        q("#btn").onclick=pX;ld();
    </script>
</body>
</html>
