<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Planner</title>
    <style>
        *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#fff}#splash{position:fixed;inset:0;z-index:9;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#38BA54}#splash b{font-size:36px;color:#fff;margin-bottom:10px}#splash i{width:120px;height:2px;background:rgba(255,255,255,.3);overflow:hidden;position:relative}#splash i:after{content:"";display:block;width:40px;height:100%;background:#fff;animation:l .9s infinite;position:absolute}@keyframes l{from{left:-40px}to{left:120px}}.app{width:90%;max-width:300px;visibility:hidden}label{font-size:16px;color:#333;margin:0 0 6px 2px;display:block}.row{display:flex;align-items:center;gap:8px;border-bottom:1px solid #ccc;padding:4px 0}.row.err{border-color:#e53935}.row.ok{border-color:#38BA54}input{flex:1 1 auto;min-width:0;border:0;padding:12px 6px 12px 2px;font-size:18px;background:0;outline:0}input::placeholder{font-size:16px;color:#999}button{flex:0 0 auto;width:70px;padding:6px 0;border:1px solid #aaa;border-radius:20px;background:0;color:#aaa;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;white-space:nowrap}button.ready{background:#38BA54;color:#fff;border-color:#38BA54;cursor:pointer}button.ready:active{background:#2e9644;transform:scale(.97)}.errmsg{font-size:13px;color:#e53935;margin:14px 0 0 2px;display:none}
    </style>
</head>
<body>
    <div id="splash"><b>Planner</b><i></i></div>
    <div class="app">
        <label>CPF</label>
        <div class="row">
            <input id="cpf" placeholder="CPF (somente números)" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
            <button id="btn" disabled>ENTRAR</button>
        </div>
        <div class="errmsg" id="err"></div>
    </div>
    <script>
        setTimeout(() => {
            document.getElementById("splash").remove();
            document.querySelector(".app").style.visibility = "visible"
        }, 1600);

        const $ = s => document.querySelector(s),
            c = $("#cpf"),
            b = $("#btn"),
            e = $("#err"),
            r = $(".row"),
            n = v => v.replace(/\D/g, "").padStart(11, "0"),
            v = c => !/^(\d)\1+$/.test(c) && [9, 10].every(t => {
                let s = 0;
                for (let i = 0; i < t; i++) s += c[i] * (t + 1 - i);
                return ((s * 10) % 11) % 10 == c[t]
            }),
            s = s => {
                r.className = "row";
                if (s) r.classList.add(s)
            },
            x = () => {
                b.disabled = 1;
                b.className = "";
                s();
                e.style.display = "none"
            };

        let t;
        c.oninput = () => {
            c.value = c.value.replace(/\D/g, "");
            if (t) clearTimeout(t);
            x();
            if (!c.value) return;
            if (c.value.length === 11) c.blur();
            if (c.value.length < 11) return;
            const v1 = n(c.value);
            if (!v(v1)) {
                e.textContent = "CPF inválido";
                e.style.display = "block";
                s("err");
                return
            }
            t = setTimeout(async () => {
                try {
                    const rs = await fetch("https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/239ef024d32946f99a66585bed86d236/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ItjHZInk4ZgqUycsWShgWkI1PEphNs_bQhmpReiFwuA", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ cpf: v1 })
                    });
                    const d = await rs.json();

                    // --- ALTERAÇÃO AQUI ---
                    // Verifica se o CPF bate E se a coluna ID contém o caractere #
                    const usuarioValido = (d.codigo || []).find(x => n(x.CPF2 || x.CPF) === v1 && String(x.ID).includes("#"));
                    
                    if (!usuarioValido) throw 0;
                    // -----------------------

                    sessionStorage.setItem("preData", JSON.stringify(d));
                    b.disabled = 0;
                    b.classList.add("ready");
                    s("ok")
                } catch {
                    e.textContent = "CPF não autorizado";
                    e.style.display = "block";
                    s("err");
                    b.disabled = 1
                }
            }, 400)
        };
        b.onclick = () => {
            if (!b.disabled) {
                sessionStorage.setItem("cpf", n(c.value));
                location.href = "mapa/index.html"
            }
        }
    </script>
</body>
</html>
